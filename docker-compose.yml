services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: g7-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: g7-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: g7-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gnuboard7
      MYSQL_USER: g7
      MYSQL_PASSWORD: g7password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: g7-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  dbdata:
