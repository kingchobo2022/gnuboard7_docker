services:
  # 1. PHP & Node.js Application Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: g7-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - g7-network
    depends_on:
      - db
      - redis

  # 2. Nginx Web Server
  web:
    image: nginx:alpine
    container_name: g7-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - g7-network
    depends_on:
      - app

  # 3. MySQL Database
  db:
    image: mysql:8.0
    container_name: g7-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gnuboard7
      MYSQL_USER: gnu_user
      MYSQL_PASSWORD: gnu_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - g7-db-data:/var/lib/mysql
    networks:
      - g7-network

  redis:
    image: redis:alpine
    container_name: g7-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - g7-redis-data:/data
    networks:
      - g7-network

networks:
  g7-network:
    driver: bridge

volumes:
  g7-db-data:
  g7-redis-data:
