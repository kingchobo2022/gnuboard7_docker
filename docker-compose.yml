version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: g7-app
    restart: unless-stopped
    tty: true
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    networks:
      - g7-network

  webserver:
    image: nginx:alpine
    container_name: g7-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - g7-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: g7-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: gnuboard7
      MYSQL_USER: g7_user
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - g7-network

  redis:
    image: redis:alpine
    container_name: g7-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - g7-network

networks:
  g7-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
