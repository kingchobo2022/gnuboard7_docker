# audit:allow test-scenario-coverage reason: 페이지 설정은 편집기 모달(8탭 셸/제목 배너/SEO 값 칸/타겟 picker — dnd-kit·합성 이벤트·포털 모달 의존)이라 Playwright 자동화 부적합(text-inline-binding.yaml 동일 정책). 입력 조합·후속 효과 cross product 는 단위 RTL(PageSettingsModal/PageTitleBanner/DataChipValueInput 14 + computed-inheritance 등)이 전수 커버하고, 캔버스 라이브 반영·저장→DB 영속→새로고침 복원·실사용자화면 렌더는 Chrome MCP §공통 검증 매트릭스(L0~L7)로 라이브 실측. SEO 값 칸 키화 0·이중인코딩 0 은 tinker DB 실측이 SSoT.
feature: 레이아웃 편집기 페이지 설정 모달 (8탭 셸 + 제목 배너 + 캔버스 dataKey/격리/타겟 picker + SEO 값 칸 표현식·칩 확대)
phase: 8
session: S10-1
issue: 383
axes:
  # 셸 라우팅·고급 배지·진입점 (~2.2)
  active_tab: [meta, seo, init, overlay, computed, state, error, data]
  advanced_badge: [none, init_advanced_count, computed_advanced_count, total_summary]
  entry_point: [toolbar_button, banner_settings_gear]
  toolbar_state: [route_active, base_active, modal_active, extension_disabled, iteration_item_disabled, no_selection_disabled]
  # 제목 배너 4상태 
  banner_state: [title_plaintext_editable, title_i18n_key_editable, title_missing_fallback_readonly, title_expression_advanced_readonly]
  banner_edit: [double_click_enter_commit, esc_cancel, plaintext_creates_key, existing_key_updates_value]
  banner_mode_visibility: [route_visible, extension_hidden, iteration_item_hidden]
  # 기본 정보 
  meta_field: [title, description, icon, editor_label, permissions]
  # 자동 계산 상속 
  computed_authoring: [preset_9, custom_3step, advanced_preserve]
  computed_inheritance: [parent_only, child_only, both_distinct_keys, same_key_route_override, three_level]
  computed_inherit_op: [view_source_badge, edit_parent_override, revert_to_common, same_name_add, child_only_patch]
  # 캔버스 dataKey/격리 
  core_datakey: [static_value, binding_degraded, empty_removes_key, dot_path_allowed]
  isolated_scope: [toggle_on_seeds_scopeid, toggle_off_removes, scopeid_search_candidate, scopeid_free_input, duplicate_notice]
  # 타겟 picker 캔버스 pick 
  target_picker: [manual_input, canvas_pick_request, canvas_pick_picked, canvas_pick_id_not_assigned_ignored, canvas_pick_cancel, request_id_mismatch_ignored, host_modal_minimize_restore]
  # SEO extensions 결선
  seo_extensions_supply: [fetch_to_availableExtensions, empty_degrade]
  # 에러 처리 
  error_handler_kind: [none, showErrorPage, navigate, openModal, toast, setState, sequence, parallel]
  # 데이터 
  data_readonly_section: [global_headers, scripts, empty_hint]
  # SEO 값 칸 표현식/칩 확대 (표현식 분해 트리 → 값 전용 필드 일반화④)
  # 키화 0(값 필드는 $t:custom.* 미생성) + 칩 시각화(데이터연결/설정참조 raw 코드 비노출)
  seo_value_field: [og_image, tw_image, og_image_alt]            # 값 전용 칸(DataChipValueInput)
  seo_text_field: [search_title, search_desc, og_title, og_desc] # 텍스트 칸(I18nTextField, 키화 유지)
  seo_value_shape: [plain, data_binding, settings_ref, single_conditional, multi_segment, fallback]
  seo_value_op: [type_plaintext, type_binding_focus_retained, blur_to_chip, fx_to_expression_tree, change_data, to_fallback]
  # 모듈 자동값 → 연결 칩(역산출). 모듈 seoOgDefaultMeta/seoStructuredDataMeta 가
  # 데이터 경로(expr)+라벨을 공급 → 자동값 행을 "상품 이름" 연결 칩으로 표시 + 다른 데이터로 교체.
  seo_auto_chip_field: [og_image, og_image_alt, structured_name, structured_offers_price]  # 자동값 칩 대상
  seo_auto_chip_op: [render_link_chip_with_label, replace_to_override, fallback_plaintext_when_no_meta]
  # 자동 계산(computed)·로딩 화면(overlay)·SEO 보조
  # 텍스트 칸도 "단순 데이터 연동" 가능하도록 DataChipValueInput/I18nTextField 로 승격. 값/경로 칸은
  # 데이터 칩(키화 0), 사용자 표시 문구(spinner)는 다국어 키화. 식별자(id/키이름/숫자인덱스)는 평문.
  chip_expand_field:
    - computed_preset_param        # ComputedForm preset 파라미터(화면상태경로/주소파라미터/기본값)
    - computed_sum_field           # CustomComputedBuilder 합산 필드
    - computed_tooptions_field     # toOptions value/label 필드
    - computed_nth_prop            # nth 속성(경로)
    - computed_literal_value       # literal 값
    - computed_firstof_fallback    # firstOf 기본값
    - computed_condition_field     # 조건 필드
    - computed_condition_value     # 조건 값
    - overlay_spinner_text         # 로딩 화면 안내 문구(I18nTextField=다국어 키화)
    - seo_og_site_name             # og.site_name/locale 등 textRow 7칸(DataChipValueInput)
  chip_expand_value_shape: [plain, data_binding, single_conditional, settings_ref]
  chip_expand_op: [type_plaintext_no_keyify, search_pick_data_chip, fx_to_expression_tree, keyify_for_display_text_only]
exclusions:
  - { active_tab: meta, advanced_badge: init_advanced_count, reason: "기본 정보 탭엔 미환원 항목 개념 없음" }
  - { toolbar_state: extension_disabled, banner_mode_visibility: route_visible, reason: "extension 모드는 배너 미표시·버튼 비활성 동시" }
  - { computed_inheritance: child_only, computed_inherit_op: revert_to_common, reason: "순수 자식 키는 되돌릴 부모 값 없음(route-override 만 되돌리기)" }
  - { core_datakey: binding_degraded, meta_field: title, reason: "바인딩 디그레이드 dataKey 는 읽기전용 — 다른 meta 편집과 직교(중복 조합 배제)" }
  - { target_picker: manual_input, seo_extensions_supply: fetch_to_availableExtensions, reason: "직접 입력 picker 는 SEO extensions 결선과 무관 축(직교 배제)" }
  # SEO 값 칸 표현식 확대 — 값 칸/텍스트 칸은 컴포넌트 자체가 다름(상호 배제), op 는 칸 종류별로 제한
  - { seo_value_field: og_image, seo_text_field: search_title, reason: "값 칸(DataChipValueInput)과 텍스트 칸(I18nTextField)은 서로 다른 컴포넌트 — 한 칸이 동시에 둘일 수 없음(상호 배제)" }
  - { seo_value_op: fx_to_expression_tree, seo_value_field: og_image, reason: "fx(표현식으로 바꾸기) 토글은 텍스트 칸 전용 진입점 — 값 칸은 이미 표현식 1급(자동 분해), fx 버튼 비노출" }
  - { seo_value_op: change_data, seo_value_shape: plain, reason: "데이터 바꾸기는 단일 바인딩 칩 상태에서만 노출 — 평문은 검색/표현식/기본값 어포던스만" }
  - { seo_value_shape: settings_ref, seo_value_op: type_binding_focus_retained, reason: "설정참조는 데이터 검색이 아닌 직접 타이핑/붙여넣기 — focus 유지 회귀는 데이터 바인딩 입력 축에서 대표 검증" }
  # 묶음③ 자동 칩 — fallback_plaintext op 는 메타 미선언 키 전용(라벨 칩 op 와 상호 배제)
  - { seo_auto_chip_op: fallback_plaintext_when_no_meta, seo_auto_chip_field: structured_offers_price, reason: "메타 미선언 폴백은 임의 키에서 동일 — 대표 1축(og_image)에서만 검증(직교 중복 배제)" }
  - { seo_auto_chip_op: replace_to_override, seo_auto_chip_field: structured_name, reason: "구조화 자동 블록은 OFF 미리보기(읽기전용 칩 표시)만 — '다른 데이터로 바꾸기'(override 진입)는 og 키 전용 어포던스" }
  - { seo_auto_chip_op: replace_to_override, seo_auto_chip_field: structured_offers_price, reason: "구조화 자동 블록은 OFF 미리보기 읽기전용 — override 진입은 og 키 전용" }
  # 전 입력칸 데이터 칩 확대 — 칸 종류별 키화 정책 상호 배제
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_preset_param, reason: "다국어 키화는 사용자 표시 문구(spinner) 전용 — 자동 계산 값/경로 칸은 값 전용(키화 0)" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_sum_field, reason: "동일 — computed 값/경로 칸은 키화 0" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_tooptions_field, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_nth_prop, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_literal_value, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_firstof_fallback, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_condition_field, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: computed_condition_value, reason: "동일" }
  - { chip_expand_op: keyify_for_display_text_only, chip_expand_field: seo_og_site_name, reason: "og.site_name 은 값 전용(DataChipValueInput, 키화 0) — 키화는 spinner 전용" }
  - { chip_expand_op: fx_to_expression_tree, chip_expand_value_shape: plain, reason: "fx(표현식 진입)는 표현식 가능 형태 전용 — 순수 평문은 검색/표현식 어포던스만" }
  - { chip_expand_op: search_pick_data_chip, chip_expand_value_shape: settings_ref, reason: "설정참조는 직접 타이핑 — 데이터 검색 칩과 직교(대표 1형태에서 검증)" }
