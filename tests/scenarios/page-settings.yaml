notes: |
  S10-1 세션 D 통합 — 8탭 셸(PageSettingsModal) + 제목 배너(PageTitleBanner) + 진입점
  (EditorToolbar ⚙페이지 설정, ⚙데이터 흡수) + computed route-override 승격배지/되돌리기 +
  캔버스 dataKey(core-datakey 위젯)/격리 영역(IsolatedScopeControl)/타겟 picker pick 모드 +
  SEO extensions 결선. 셸/배너/picker 는 prop 주도 RTL(Provider hook mock)로 라우팅·핸드셰이크
  격리 검증. 캔버스 pick 핸드셰이크는 ComponentTargetPicker RTL 이 이벤트 계약(request/picked/
  cancelled/requestId 짝)을 잠그고, EditorCanvasOverlay 수신측은 합성 클릭 의존이라 Chrome MCP
