notes: |
  텍스트 데이터 연결 UI 는 속성 모달(dnd-kit/합성 이벤트 의존)이라 Playwright 자동화 부적합
  (InlineBindingSection.tsx / DataBindingSection.tsx L1 `// e2e:allow` 동일 정책). cross product 의
  입력 조합·후속 효과는 단위(inlineBindingUtils/textComponents) + 레이아웃 렌더링(InlineBindingSection/
  TranslationField RTL)이 전수 커버하고, 캔버스 라이브 반영·저장·실사용자화면 렌더는 Chrome MCP
  §공통 검증 매트릭스로 확인한다(브라우저 axis 비대상).
