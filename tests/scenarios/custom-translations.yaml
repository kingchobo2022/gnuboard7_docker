# audit:allow test-scenario-coverage reason: 본 시나리오는 #7(S8-1 백엔드 + S8-2 프론트) 동적 다국어 키 인프라 + 편집기 인라인 편집 + S8-2 후속(좀비 키 자동 감지 + 관리 모달) 회귀 가드. axis cross-product 는 Feature/Unit/Vitest 테스트(test_files)가 cover. E2E axis 는 Playwright spec(inline-edit-i18n.spec.ts / orphan-translation-manager.spec.ts)의 @scenario/@effects docblock 과 매칭. effects 는 키 자동생성·낙관적 잠금·런타임 병합·캐시 무효화·인라인 편집·로케일 전환·서식 툴바·번역 탭·좀비 감지·일괄 삭제 카테고리별로 enumerate.

feature: 템플릿 커스텀 다국어 키 + 편집기 인라인 편집 (template_custom_translations)

description: |
  레이아웃 편집기 인라인 편집에서 평문을 `$t:custom.{layout}.{seq}` 동적 키로
 전환할 때 사용하는 백엔드 인프라 + 그 위의 프론트 UI(S8-2:
  로케일 전환 토글 + 더블클릭 인라인 편집 + 서식 툴바 + 속성 모달 번역 탭).

  핵심 동작:
    - 키 자동 생성 `custom.{layoutKey}.{seq}` — 레이아웃명 정규화(board/list→board_list),
      레이아웃 단위 단조 증가 seq, unique(template_id, translation_key) 위반 시 seq 재시도
    - 신규 키 생성 시 모든 활성 로케일(supported_locales)에 입력값 폴백 시드
    - 낙관적 잠금 — update 경로에 expected_lock_version 필수, 불일치 시 409 Conflict,
      성공 시 lock_version 1 증가
    - 런타임 병합 — MergeCustomTranslations 리스너가 template.language.merge 필터에
      언어팩(priority 10) 다음(priority 20)으로 등록, 활성 키를 점 경로로 덮어씀
    - 캐시 무효화 — CRUD 시 ext.cache_version bump → serveLanguage 캐시 stale
    - HasUserOverrides — 언어팩 재설치 시 유저가 수정한 로케일 값만 보존

axes:
  operation: [index, store, update, destroy]
  locale: [ko, en]
  layout_name: [single_segment, slashed, empty_fallback]
  seq_state: [first_key, incremented, after_existing_rows, unique_collision_retry]
  lock_version_match: [match, stale_conflict, missing_field]
  status: [active, orphaned]
  permission: [has_edit, no_edit, unauthenticated]
  template_ownership: [own_template, other_template]
  merge_priority: [no_languagepack_key, overrides_languagepack_key]
  locale_value_presence: [has_locale, fallback_to_fallback_locale]
  # 프론트 — 편집기 인라인 편집 입력 축
  source_state: [plain_text, custom_key_existing, binding_expression, data_bound]
  inline_action: [save_on_enter, save_on_blur, cancel_on_escape]
  toolbar_button: [fontWeight, fontStyle, textDecoration, textAlign, fontSize, textColor]
  componentCapability_declared: [yes_full_styleControls, yes_partial, no]
  content_locale: [single_locale, multi_locale]
  # 좀비(고아) 키 자동 감지 + 관리 모달
  orphan_trigger: [reference_removed, node_deleted, reference_restored, still_referenced]
  bulk_destroy_scope: [single_select, multi_select, purge_all_orphaned, cross_template_filtered]
  manager_filter: [all, active, orphaned]

exclusions:
  - { operation: index, lock_version_match: stale_conflict, reason: "index 는 잠금 무관" }
  - { operation: destroy, lock_version_match: missing_field, reason: "destroy 는 expected_lock_version 미요구" }
  - { operation: store, lock_version_match: stale_conflict, reason: "store 는 신규 생성 — lock_version 항상 0 시작" }
  - { source_state: binding_expression, inline_action: save_on_enter, reason: "바인딩 식 텍스트는 인라인 편집 비활성 — 입력 불가" }
  - { source_state: data_bound, inline_action: save_on_enter, reason: "iteration 데이터 결정 노드는 인라인 편집 비활성" }
  - { componentCapability_declared: no, toolbar_button: fontWeight, reason: "styleControls 미선언 → 서식 툴바 버튼 부재 — 클릭 불가" }

