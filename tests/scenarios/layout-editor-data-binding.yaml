validation:
  note: |
    Vitest 단위가 후보 풀(scalar/array/object shape, per-state _local/route/query/_computed,
    엔티티 객체 vs 순수 컨테이너, shape 필터, 키워드 검색, parseBindingExpression 디그레이드)과
    dataProps 전수 선언·직교 가드·shape enum·label i18n·stateLabels 카탈로그 i18n 을 잠근다.
    데이터 연결 UI 는 검색형 피커 + dnd-kit 캔버스 노드 선택 의존이라 Playwright 자동화 부적합
    (DataBindingSection.tsx / specTypes.ts e2e:allow 정책과 동일). 라이브(데이터 prop 선택 →
    검색형 피커 연결 → 캔버스 샘플 라이브 렌더 → 상태 토글 데이터 변화 → 저장 → 실사용자화면
    fetch 렌더, 위지윅↔사용자 페이지 동일성)는 **Chrome MCP §공통 5단계 매트릭스**로 검증한다.
    data_source label_key 전수 부여는 6-c(전 레이아웃 누락 0 의무).
  e2e_exempt: "데이터 연결 UI = 검색형 피커 + dnd-kit 합성 이벤트 의존 — Chrome MCP 매트릭스로 라이브 검증(e2e:allow 정책 정합)"
