validation:
  note: |
 단계 1-a 는 위젯/컨트롤 정의만으로 라이브 편집기에 속성 탭이 아직 등장하지 않는다
 (capability 부착이 단계 1-b/1-c). 라이브 E2E(추가→편집→사용자반영)는 1-b/1-c 의 spec 이
    작성하며, 본 매니페스트의 effects(capability_attachment_*, prop_edit_reflects_*)를 그
    spec 의 @scenario layout-editor-prop-controls / @effects 로 매칭한다.
  e2e_spec_pending: tests/Playwright/specs/layout-editor/property-edit-propcontrols.spec.ts  # 단계 1-b/1-c
