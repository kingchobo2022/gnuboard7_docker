# audit:allow test-scenario-coverage reason: 시각 회귀 없는 자산 정의 튜닝 + 호출처 토큰 전수 정리. .alert-{info,warning,danger,success,error} 패밀리의 padding/gap/text 톤을 자산에 흡수 + 외부 mt-* 책임 호출처로 위임 + 39개 JSON 호출처에서 redundant 토큰 일괄 제거. 데이터/액션/i18n 키 모두 동일.

feature: 어드민·사용자 안내 박스 .alert-* 자산 시맨틱 완성 + 호출처 전수 redundant 토큰 제거 (#408 보강)

description: |
  이슈 #408 후속 — admin_basic 의 .alert-* 안내 박스 패밀리를 자산 단독으로 동작
  가능한 수준까지 완성하고, 145개 호출처 중 자산 흡수로 정리 가능한 39개 호출처를
  스크립트로 일괄 정합.

  자산 책임 (5종 모두 일관):
    - flex items-center gap-3 (내부 정렬·간격)
    - px-3 py-3 border rounded-md (4면 padding + 외형)
    - bg-{color}-50 + dark:bg-{color}-900/20 + border-{color}-200 + dark:border-{color}-800 (색조)
    - text-sm + text-{color}-900 + dark:text-{color}-100 (기본 텍스트 톤 — variant 별 짙은 색)
    - row-stack 자식일 때 padding 복원 룰 (.row-stack > .alert-*) — first/last-child
      pt-0/pb-0 override 무력화
  자산이 보유하지 않는 토큰 (호출처 책임으로 위임):
    - mt-* / mb-* / mx-* (부모-자식 외부 간격 — 부모/형제 책임)
    - p-4 (자산 p-3 보다 큰 padding 이 필요한 경우 호출처 override)
    - px-4 py-3 등 padding 변형 (배경 박스 비율 변경 시 호출처 override)
    - flex-start (items-start — 다중 라인 콘텐츠 정렬 필요 시)
    - text-xs + text-{soft variants} (작은 텍스트 — 자산 text-sm 보다 옅음)
    - max-w-* / w-* / text-left / text-center (폼·에러 박스 layout 변형)
    - hover:* / disabled:* / transition-* / font-medium (alert-* 를 버튼 컬러 테마로
      misuse 한 사이트 — 의미 정합은 별도 정리 필요, 본 작업 미터치)

  결정 요약:
    - 자산: mt-3 제거 — 호출처가 부모 컨텍스트 (row-stack / admin-card / stack 등)
      따라 외부 간격을 직접 명시
    - 자산: text-sm + variant 별 text 색 (text-blue-900 등) 흡수 — 호출처에서
      redundant 텍스트 톤 토큰 자동 정리
    - 호출처: flex / items-center / flex-center / gap-2 / gap-3 / px-3 / py-3 /
      p-3 / text-sm + variant default 색 토큰 일괄 드랍 (스크립트 c:/tmp/alert-cleanup.cjs)
    - 39개 호출처 갱신: admin_basic 24건, sirsoft-basic 4건, board 10건, ecommerce 13건,
      plugin nicepayments 1건 — 자산 misuse (버튼/링크) 사이트는 보호 정규식으로 제외
    - .alert-error 도 #408 통일 스타일 적용 — 옛 p-4 rounded-lg items-start 정의 제거

