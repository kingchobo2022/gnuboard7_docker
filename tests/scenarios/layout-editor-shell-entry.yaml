# audit:allow test-scenario-coverage reason: 본 매니페스트는(레이아웃 편집기 진입/셸/라우트 트리) 시나리오 매트릭스 SSoT. 핵심 회귀 가드는 test_files 의 통과 테스트(Vitest + PHPUnit)로 커버. Phase 1 은 백엔드 source 태깅 + G7Config 메타 보강 + 프론트 셸 골격에 한정 — 캔버스 렌더는 Phase 2, 요소 배치는 Phase 3.

feature: 레이아웃 편집기 셸 + 진입 경로 + 라우트 트리

description: |
  레이아웃 편집기 진입 경로(템플릿 관리 버튼 / 운영 화면 FAB) 와 편집기 셸(상단 툴바 +
  좌측 라우트 트리 + 캔버스 영역) 골격 + 라우트 트리 데이터 구성(소스 그룹핑).

  배경:
 - 기존 MVP 위지윅 편집기는 Phase 0 에서 완전 제거됨.
    - 신규 편집기는 G7 코어의 한 기능으로 어떤 템플릿에도 종속되지 않고,
 기존 템플릿 엔진(코어) 위에 얹혀진 형태로 동작 — 별도 시스템 격리 금지.
    - TemplateApp.init() 일반 부팅 → renderTemplate() 안 checkLayoutEditorMode 분기로 진입.
    - 셸은 state.reactRoot 에 같은 컨텍스트 래퍼 안에서 렌더(별도 createRoot/컨테이너 금지).
    - 다국어는 lang-packs/_bundled/g7-core-{locale}/frontend/layout_editor.json 한 곳 SSoT.
    - 활성 확장 SSoT 는 window.G7Config.activeModules / activePlugins (신규, 비파괴적).
    - 라우트 트리 그룹핑을 위해 getRoutesDataWithModules 가 각 라우트에 source 메타 부여.

axes:
  entry_path: [template_manage_button, ops_screen_floating_fab]
  user_state: [authenticated_with_perm, authenticated_no_perm, guest]
  ui_mode: [normal_render, edit_mode]
  target_template: [active, inactive]
  route_source: [template, module, plugin, core]
  route_label_source: [editor_label, title, path]
  route_visibility: [visible, hidden, redirect]
  route_nesting: [flat, has_parent]
  modal_definition: [inline, partial_ref, inherited_from_base]
  base_layout_present: [yes, no]
  session_expiry_recovery: [same_tab_return, fresh_open]
  admin_ui_locale: [ko, en, ja]

exclusions:
  - { user_state: guest, entry_path: ops_screen_floating_fab,
      reason: "비로그인은 FAB 자체가 렌더되지 않음 — 클릭 진입 불가" }
  - { ui_mode: edit_mode, entry_path: ops_screen_floating_fab,
      reason: "편집 모드에서는 FAB 미표시 (8.2.2 (1))" }
  - { user_state: authenticated_no_perm, entry_path: ops_screen_floating_fab,
      reason: "권한 미보유 사용자는 FAB 미렌더 (8.2.2 (1))" }

