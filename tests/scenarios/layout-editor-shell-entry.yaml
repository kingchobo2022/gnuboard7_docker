rules_layer_coverage:
  - rule: service-direct-data-access
    coverage: TemplateService::getRoutesDataWithModules 의 source 태깅은 라우트 메타 부여(읽기 + map 변형)만 수행, 새 mutation 없음
  - rule: i18n-throw-hardcoded-korean
    coverage: 편집기 chrome 의 모든 문자열은 layout_editor.* 키 — 평문 한국어 미사용. chrome-i18n-coverage.test.ts 가 정적 스캔으로 가드
