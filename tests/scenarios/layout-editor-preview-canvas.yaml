# audit:allow test-scenario-coverage reason: 본 매니페스트는(편집기 프리뷰 캔버스 + 샘플 데이터 + 출처 메타 + 반응형 디바이스 미리보기) 시나리오 매트릭스 SSoT. 핵심 회귀 가드는 test_files 의 통과 테스트(Vitest 단위/통합 + PHPUnit Feature)로 커버. Phase 2 는 캔버스 렌더 + 샘플 모드 + 백엔드 출처 메타 옵션 신설에 한정 — 요소 배치/추가/드래그는 Phase 3, 속성 편집은 Phase 4.

feature: 레이아웃 편집기 프리뷰 캔버스 + 샘플 데이터 + 반응형 디바이스 미리보기

description: |
  편집기 셸의 캔버스 영역에서 선택한 라우트의 레이아웃을 실제로 렌더링하고,
  데이터 의존 영역을 샘플 데이터로 채워 예시 화면으로 표시한다.
  데이터 결정 영역은 텍스트 편집 불가로 표시. 라우트 편집 시 base 레이아웃
  출처 노드는 잠금 표시. 디바이스 미리보기(데스크톱/태블릿/모바일) 전환 시
  responsive 가 적용된 실시간 렌더로 전환.

  배경:
 - Phase 1 산출물(셸/툴바/라우트 트리) 위에 얹힘. 셸은 동일하게 코어 React tree.
 - `with_source_meta=1` 옵션이 백엔드 응답에 __source 메타를 부여.
 - DataSourceManager 의 sampleProvider 옵션이 fetch 를 대체.
 - ResponsiveProvider overrideWidth 로 디바이스 폭 강제.

axes:
  edit_mode: [route, base, modal, extension]
  node_origin: [route_self, base_via_extends, partial_via_host, extension_inject]
  data_dependency: [static, bound_text, iteration, ancestor_iteration]
  sample_source: [spec_byId, spec_byEndpoint, core_preset, ds_fallback, generic_infer]
  preview_device: [desktop, tablet, mobile, custom]
  device_overflow: [fits_canvas, exceeds_canvas]
  responsive_override_declared: [none, mobile, tablet, mobile_and_tablet, portable]
  modal_definition: [inline_in_route, inline_in_base_inherited, partial_ref]
  extension_point_state: [empty_placeholder, has_injected_fragment]
  with_source_meta_option: [absent, present_with_permission, present_without_permission, present_guest]
  user_state: [editor_authorized, authenticated_no_perm, guest]

exclusions:
  - { edit_mode: extension, node_origin: partial_via_host,
      reason: "확장 편집 캔버스는 호스트 본체 잠금 — partial 출처 노드는 호스트 소속으로 분류돼 잠금" }
  - { edit_mode: base, modal_definition: inline_in_route,
      reason: "base 편집 모드는 호스트 라우트 modals 를 다루지 않음" }
  - { device_overflow: exceeds_canvas, preview_device: mobile,
      reason: "모바일 폭(390)은 대부분의 캔버스 가용폭 안에 들어가 overflow 가 의미 없음" }
  - { with_source_meta_option: present_guest,
      reason: "guest 는 401 로 차단됨 — 인증 후 권한 체크가 이뤄지므로 비인증 + 메타 옵션은 401 단일 분기" }
  - { with_source_meta_option: present_without_permission, user_state: editor_authorized,
      reason: "축의 의미 중복 — editor_authorized 는 권한 보유와 동의어" }

