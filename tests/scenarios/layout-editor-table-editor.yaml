  - table_editor_registered_via_registercoreeditors_kind_agnostic
  - property_modal_dispatches_table_node_editor_in_props_tab_by_kind
  # grid 변환
  - tree_to_grid_expands_thead_tbody_with_merge_coordinates
  - tree_to_grid_detects_overlap_and_hole_marks_invalid
  - params_role_mapping_neutral_div_grid_works_same_adapter
  # 행/열 구조
  - add_row_inserts_blank_row_keeps_col_count
  - add_row_bumps_rowspan_origin_for_absorbed_cells
  - remove_row_keeps_min_one_row
  - remove_row_decrements_crossing_rowspan
  - move_row_band_moves_merge_block_as_unit
  - move_row_section_boundary_disabled_with_reason
  - add_column_inserts_blank_col
  - add_column_bumps_colspan_for_crossing_cell
  - remove_column_keeps_min_one_col
  - remove_column_decrements_crossing_colspan
  - move_column_band_moves_merge_block_as_unit
  - move_column_table_edge_band_disabled_boundary
  # 병합/해제
