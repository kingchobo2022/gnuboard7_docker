feature: 레이아웃 편집기 배열 빌트인 — array 노드 에디터(ARRAY-PROP 속성 패널)

description: |
  컴포넌트의 정적 배열 prop(node.props[arrayProp] — 예 TabNavigation tabs, Breadcrumb items,
  Dropdown/ActionMenu items, DataGrid columns, PageHeader actions)을 속성 모달 본체에서 항목
  단위로 구조 편집한다. capability 의 일반 슬롯 `nodeEditor:{kind:"array",params:{arrayProp,
  itemLabel,fields,newItem}}`(부록4-ter)로 선언하고, 코어 빌트인 ArrayItemsEditor 를
  registerCoreEditors 가 registerNodeEditor('array', ...) 로 일반 레지스트리에 등록한다(특권
  분기 0 — 코어는 kind 만 알고 컴포넌트명/배열 prop 이름을 가정하지 않음. arrayProp/항목 필드
  스키마는 params 가 공급 → 임의 배열 prop 컴포넌트에 동일 에디터 재사용).

  children 노드 에디터(ChildrenListControl)가 실제 자식 노드 트리를 다루는 것과 달리, array
  에디터는 props 안의 정적 데이터 배열(객체/원시 항목)을 추가/삭제/정렬/필드편집한다.

  필드 위젯: text(평문 즉시 반영) / i18n-text(평문 blur → createCustomKey → $t:custom.* 기록,
  기존 키 → updateCustomKeyValue 현재 로케일만) / select(options) / boolean / icon(아이콘명 문자열).
  primary 필드(미지정 시 첫 필드)는 행 주 입력. 원시 string[] 항목은 primary 필드로 값 자체 편집.

 정적-바인딩 가드: props[arrayProp] 가 `{{...}}` 데이터바인딩이거나 비-배열이면 편집
  비대상 → "바인딩됨(코드 편집)" 디그레이드(덮어쓰기 위험 차단). 항목 텍스트 다국어는
  children/table 항목과 공용 모델(createCustomKey) SSoT.

axes:
  operation: [add, remove, move, edit_text_field, edit_i18n_field, edit_select, edit_boolean, edit_icon]
  array_value: [static_array, binding_expression, non_array, empty]
  field_widget: [text, i18n_text, select, boolean, icon]
  template: [sirsoft-basic, sirsoft-admin_basic]

