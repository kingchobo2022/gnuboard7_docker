  - resources/js/core/template-engine/layout-editor/__tests__/components/ArrayItemsEditor.test.tsx
  - resources/js/core/template-engine/layout-editor/__tests__/spec/editorRegistries.test.ts
  - tests/Playwright/specs/layout-editor/array-editor.spec.ts

validation:
  note: |
    Vitest 단위가 axes cross product 회귀(추가/삭제/정렬, text/select/boolean/icon/i18n-text 필드
    편집, 바인딩/비-배열/미선언 디그레이드, 원시 string[] 항목, 노드 파생 무상태)와 capability
    부착·등록(kind-agnostic)을 잠근다. Playwright E2E 가 라이브 편집기에서 TabNavigation 선택 →
    array 에디터 마운트 → 탭 추가 → 라벨 편집 → 정렬 → 저장(PUT 200) → 실사용자화면 반영을
    브라우저로 검증한다. 캔버스 인플레이스 레퍼런스(TabNavigation registerCanvasOverlay)는 단계
    4-b 산출물 — 본 단계는 속성 패널 경로.
  e2e_spec: tests/Playwright/specs/layout-editor/array-editor.spec.ts
