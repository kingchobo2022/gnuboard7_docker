# audit:allow test-scenario-coverage reason: axes cross product 의 핵심 회귀 가드는 test_files 의 단위(recipeEngine.scope/styleScope/flexModel/StyleScopeTabs/property-controls/s7-property-controls)·렌더(DynamicRenderer.responsive)·Feature(LayoutControllerEditorSaveTest) 가 cover. E2E axis 는 property-editor-scope.spec.ts 의 // @scenario/@effects docblock 으로 매핑.

feature: 레이아웃 편집기 스타일 탭 — 색 모드(라이트/다크) × 디바이스별 스타일 편집

description: |
  속성 편집 모달 [스타일]/[표시조건] 탭에 색 모드 × 디바이스 세부탭을 두어, 선택 scope 가
  가리키는 위치(base props 또는 responsive.{preset|커스텀범위}.props, 다크는 dark: classToken)에
  스타일/flex/표시조건을 무손실로 기록·역해석한다.

  핵심 동작:
    - StyleScope = 색 모드(base|dark) × breakpoint(base|preset|커스텀범위) 직교 2축
    - recipeEngine.applyRecipe/reverseResolve 가 scope 인자로 컨테이너 리다이렉트(기본 BASE_SCOPE = 회귀 0)
    - 다크는 classToken 만 편집(dark: prefix 공존), 인라인은 읽기전용(darkReadonly)
    - scope≠base 오버라이드 없으면 base 상속값을 placeholder 로(baseFallback)
    - flexEnable on/off 2상태(off=명시 해제 토큰)로 디바이스별 flex 해제
    - 모달 scope = 열리는 순간 툴바 스냅샷(독립, 패치 재마운트 불변)
    - node-level responsive/if 저장·재로드 보존(백엔드 코드 변경 없음)

axes:
  color_scheme: [light, dark]
  device: [base, desktop, tablet, mobile, custom_range]
  apply_type: [classToken, styleProp, cssVar, propValue, flex]
  edit_target: [style, flex_enable, visibility_if]
  scope_override_state: [no_override_inherits_base, has_scope_override]

exclusions:
  - { color_scheme: dark, apply_type: styleProp, edit_target: style, reason: "다크 인라인은 읽기전용 — 편집 axis 아님(읽기전용 검증은 별도)" }
  - { color_scheme: dark, apply_type: cssVar, reason: "다크 인라인 불가" }
  - { color_scheme: dark, apply_type: propValue, reason: "다크 인라인 불가" }
  - { color_scheme: dark, edit_target: visibility_if, reason: "표시조건은 다크 무관(D9) — 색 모드 줄 숨김" }
  - { edit_target: flex_enable, apply_type: styleProp, reason: "flex enable 은 classToken 레시피" }
  - { edit_target: flex_enable, apply_type: cssVar, reason: "동일" }
  - { edit_target: flex_enable, apply_type: propValue, reason: "동일" }

effects:
