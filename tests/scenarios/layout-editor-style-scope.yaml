  - scope_flex_judgment_uses_node_derivation_not_computed_style
  - no_enable_control_hides_flex_toggle_in_non_base_scope
  # 표시조건
  - device_visibility_if_writes_responsive_breakpoint_if
  - base_if_unchanged_when_device_if_edited
  # 스냅샷 독립
