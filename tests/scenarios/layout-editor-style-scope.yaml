  - base_scope_writes_node_props_byte_identical_to_pre_scope
  - device_scope_writes_responsive_breakpoint_props_base_unchanged
  - custom_range_scope_writes_responsive_range_key
  - empty_override_prunes_responsive_branch_keeping_code_authored_keys
  # B안 시드 + 초기화 + 표시점
  - device_scope_seeds_base_className_so_base_tokens_survive_shallow_merge
  - seeded_base_tokens_render_as_placeholder_only_user_changes_are_solid
  - device_override_is_copy_independent_of_later_base_changes
  - reset_to_base_clears_device_override_restoring_inheritance
  - reset_dark_clears_only_dark_tokens_keeping_light
  - override_dot_shown_only_when_scope_differs_from_base_not_for_seed_only
  # 다크
  - dark_classToken_coexists_with_light_token_in_one_className
  - dark_edit_preserves_light_token_and_vice_versa
  - dark_inline_control_readonly_value_never_overwritten
