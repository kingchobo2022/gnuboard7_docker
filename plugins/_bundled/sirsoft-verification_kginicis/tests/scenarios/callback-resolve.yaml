# audit:allow test-scenario-coverage reason: 본 매니페스트는 신규 기능 시나리오 매트릭스 SSoT 로 기록. 핵심 회귀 가드는 test_files 의 통과 테스트로 커버.

feature: KG이니시스 본인인증 콜백 처리 / 비로그인 가입 PII 흡수

description: |
  KG이니시스 통합인증의 본인확인(reqSvcCd=03) 콜백 흐름과 비로그인 가입 사용자에 대한 PII 흡수 흐름 회귀 가드.

  배경:
    - 이니시스 매뉴얼 STEP2 가 callback body 에 challenge_id 를 echo 하지 않으므로 코어 표준
      `/api/identity/callback/{providerId}` 라우트 사용 불가 → 자체 callback 라우트 + STEP3
      (authRequestUrl 호출) + mtxid 매칭 흐름이 plugin 책임.
    - 비로그인 가입 흐름: provider.verify() 가 PII 를 Cache 에 stash → 가입 완료 시 코어
      `core.auth.after_register` 훅 → `CompleteInicisRecordAfterRegister` listener 가
      Cache → DB 기록 + log.user_id backfill + Cache 정리.
    - bridge URL 합성 시 G7 plugin 자동 prefix (`/plugins/{identifier}/`) 부착 필요
      (라우트 이름 `route()` 헬퍼 비사용 — pay PG plugin 6개 동일 컨벤션).

axes:
  callback_outcome:
    - provider_error_nonzero_result_code   # resultCode != '0000'
    - provider_error_blank_result_code     # resultCode 키 자체 부재
    - invalid_auth_url                     # validateAuthUrl 위조 도메인 차단
    - remote_call_failed                   # STEP3 curl 실패
    - decrypt_failed                       # SEED 복호화 실패
    - mtxid_orphan                         # STEP3 응답 mtxid 매칭 실패
    - mtxid_blank                          # STEP3 응답 mtxid 빈 문자열
    - already_consumed                     # log.status==Verified replay 방어
    - core_verify_failure                  # 코어 verify 가 failureCode 반환 (EXPIRED 등)
    - success                              # 정상 verify → token 발급
  registration_context:
    - missing_token                        # context.verification_token 부재
    - bogus_token                          # token 값은 있지만 verified log 없음
    - other_provider_token                 # token 매칭 OK 이지만 다른 provider (mail 등)
    - cache_pii_missing                    # log 매칭 OK 이지만 Cache TTL 만료 등으로 PII 부재
    - existing_user_id_on_log              # backfill 안전 가드 (이미 user_id 있는 log 미덮어씀)
    - happy_path                           # 정상 흐름

exclusions:
  - { callback_outcome: success, registration_context: missing_token, reason: "callback resolve 성공 시점과 register 흐름은 독립" }

effects:
  # InicisCallbackResolver
  - resolve_returns_outcome_failure_with_provider_error_code_when_result_code_nonzero
  - resolve_returns_provider_error_when_result_code_blank
  - resolve_returns_invalid_auth_url_failure_on_invalid_auth_url_exception
  - resolve_returns_remote_call_failed_on_remote_call_exception
  - resolve_returns_decrypt_failed_on_decrypt_exception
  - resolve_returns_not_found_when_mtxid_unmatched_or_blank
  - resolve_skips_mapping_lookup_when_mtxid_blank
  - resolve_returns_already_consumed_when_provider_throws_replay
  - resolve_returns_outcome_with_token_and_challenge_id_on_verified_result
  - resolve_returns_outcome_failure_with_core_failure_code_on_failed_result

  # InicisCallbackOutcome (DTO)
  - outcome_success_factory_sets_token_and_challenge_id_with_null_failure_code
  - outcome_failure_factory_with_challenge_id_preserves_both_fields
  - outcome_failure_factory_default_failure_code_is_unknown
  - outcome_to_bridge_query_for_success_returns_token_and_challenge_id_only
  - outcome_to_bridge_query_for_failure_returns_identity_error_only
  - outcome_to_bridge_query_handles_null_failure_code_as_empty_string

  # CompleteInicisRecordAfterRegister Listener (실제 hook 체인)
  - listener_upserts_inicis_identity_records_for_new_user_on_after_register_hook
  - listener_backfills_log_user_id_with_new_user_id
  - listener_clears_pending_record_cache_after_successful_upsert
  - listener_noops_when_verification_token_missing_in_context
  - listener_noops_when_token_does_not_match_any_verified_log
  - listener_noops_when_log_provider_id_is_not_inicis
  - listener_does_not_clear_cache_for_other_provider_log
  - listener_skips_when_cache_pii_payload_missing_or_empty
  - listener_does_not_overwrite_existing_user_id_on_log_via_backfill_safe_guard

test_files:
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Unit/Services/InicisCallbackOutcomeTest.php
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Unit/Services/InicisCallbackResolverTest.php
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Feature/Listeners/CompleteInicisRecordAfterRegisterTest.php

rules_layer_coverage:
  - rule: listener-must-implement-hooklistenerinterface
    coverage: CompleteInicisRecordAfterRegister + RegisterInicisProviderListener 모두 구현
  - rule: listener-direct-db-facade
    coverage: Listener 는 IdentityVerificationLogRepositoryInterface + InicisIdentityRecordRepositoryInterface 위임 (DB facade 직접 호출 없음)
  - rule: filter-hook-type-marker
    coverage: RegisterInicisProviderListener::getSubscribedHooks 는 type='filter' 명시
  - rule: i18n-throw-hardcoded-korean
    coverage: 모든 Exception 메시지는 sirsoft-verification_kginicis::exceptions.* 다국어 키 사용
  - rule: service-direct-data-access
    coverage: InicisCallbackResolver 는 IdentityVerificationService + Repository 인터페이스만 의존 (Model facade 미사용)