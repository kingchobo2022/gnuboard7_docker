# audit:allow test-scenario-coverage reason: Phase 2 단순화 후 functional 게이팅은 4영역(클라이언트 storage / 클라이언트 cookie / 서버 미들웨어 / cleanup) × 3축(consent / user_initiated / cookie_state) cross product 로 축소됨. registered 축 제거로 cross product 가 작아져 등록된 PHPUnit 16 + Vitest 36 = 52 케이스로 모든 axes 의 핵심 조합과 후속 효과 체인을 커버.

feature: GDPR functional 카테고리 1st-party 게이팅 (Phase 2 단순화)

description: |
  EDPB Guidelines 2/2023 §16 (사전 차단) + Guidelines 05/2020 §117 (철회 즉시 파기) 충족을 위해
  functional 카테고리에 4영역 게이팅을 적용한다.

  단순화 배경 (Phase 2 → Phase 2 단순화):
    초기 Phase 2 는 운영자가 admin UI 에서 functional storage/cookie 를 "등록 표" 에 추가하면
    그 키만 게이팅 대상이 되도록 설계했으나, 이는 GDPR 원칙 ("strictly necessary 외 비-필수는
    동의 전 차단") 과 충돌하여 등록 표를 제거하고 4단계 단순화 규칙으로 통합:

      1. strictly necessary allowlist (코드 상수) → 통과
      2. functional 동의 → 통과
      3. user-initiated 면제 (WP29 §3.6, 항상 활성) → 통과
      4. 그 외 → 차단

  영역:
    1. 클라이언트 storageInterceptor — Storage.prototype.setItem 가로채기
    2. 클라이언트 cookieInterceptor — Document.prototype.cookie setter 가로채기
    3. 서버 CookieConsentMiddleware — 응답 Set-Cookie 헤더에서 allowlist 외 모든 cookie 제거
    4. functionalCleaner — 동의 철회 또는 부팅 시 미동의면 allowlist 외 모든 storage/cookie 즉시 파기

  cleared cookie (Max-Age=0 / expires 과거) 는 위 모든 영역에서 항상 통과 — EDPB §117 와 §16
  가 충돌하지 않도록 함.

axes:
  area: [storage_interceptor, cookie_interceptor, server_middleware, cleaner]
  consent: [functional_granted, functional_denied]
  user_initiated: [recent_interaction, no_interaction]
  necessary: [in_allowlist, not_in_allowlist]
  cookie_state: [normal, cleared]
  storage_kind: [localStorage, sessionStorage]

exclusions:
  - { area: storage_interceptor, cookie_state: any, reason: "storage 영역엔 cookie_state 축 미적용" }
  - { area: cleaner, consent: functional_granted, reason: "cleaner 는 동의 철회 또는 부팅 시 미동의 상태에서만 호출 — 동의 시점엔 호출되지 않음" }
  - { area: server_middleware, user_initiated: any, reason: "서버 미들웨어는 user-interaction 컨텍스트 부재 — 클라이언트 인터셉터가 담당" }
  - { necessary: in_allowlist, consent: any, user_initiated: any, reason: "strictly necessary 는 모든 조건 무관 항상 통과" }
  - { cookie_state: cleared, consent: any, user_initiated: any, necessary: any, reason: "파기 cookie 는 모든 조건 무관 항상 통과 (§117 충돌 회피)" }

