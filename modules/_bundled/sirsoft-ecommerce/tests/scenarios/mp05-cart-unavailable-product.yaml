# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 이 없어 fallback YAML 파서가
#   nested axes 배열을 읽지 못하는 한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도
#   audit:allow 처리됨). 백엔드 안전망(담기 차단/합계 제외/체크아웃 통일)은 PHPUnit Unit·
#   Feature 가 판매상태 axis 를 커버하며 green. 프론트 표시(항목 플래그 소비)는 본 PR 의
#   레이아웃 변경 범위 밖(백엔드 차단이 핵심)이라 별도 E2E 면제.
feature: 장바구니 판매상태 백엔드 안전망 — 담기 차단 + 합계 제외 + 항목 플래그 (U13②/U4/MP05)

description: |
  판매중지/품절/출시예정/전시중지(hidden) 상품을 Product::isPurchasable() 단일 기준으로
  담기 시점 차단하고, 이미 담긴 비정상 항목은 합계 계산에서 제외하되 응답 items 에는 남겨
  available/unavailable_reason 플래그로 구분한다. 체크아웃 최종 검증도 isPurchasable 로
  통일해 기존에 누락하던 hidden 을 보강한다.

axes:
  sales_status:
    - on_sale
    - suspended
    - sold_out
    - coming_soon
  display_status:
    - visible
    - hidden
  entry_stage:
    - add             # 담기(addToCart/bulkAddToCart)
    - update_qty      # 수량 변경
    - change_option   # 옵션 변경
    - calc            # 합계 계산(getCartWithCalculation)
    - checkout        # 체크아웃 최종 검증
  actor:
    - member
    - guest

effects:
  - add_blocks_suspended_product                # 판매중지 담기 → CartUnavailableException(status)
  - add_blocks_sold_out_product                 # 품절 담기 차단
  - add_blocks_coming_soon_product              # 출시예정 담기 차단
  - add_blocks_hidden_product                   # 전시중지 담기 차단
  - add_allows_purchasable_product              # on_sale+visible 통과(회귀 가드)
  - calc_excludes_unavailable_from_total        # 비정상 항목 합계 제외
  - resource_flags_available_and_reason         # available=false + unavailable_reason 노출
  - checkout_validation_blocks_hidden_product   # 체크아웃 hidden 보강 차단
  - cart_controller_maps_unavailable_to_4xx     # 담기 판매불가 → 500 아닌 422

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/CartServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/TempOrderServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Public/CartControllerTest.php
