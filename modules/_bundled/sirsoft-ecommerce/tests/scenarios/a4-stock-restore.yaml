# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 이 없어 fallback YAML 파서가
#   nested axes 배열을 읽지 못하는 한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도
#   audit:allow 처리됨). 본 기능은 백엔드 전용 변경(재고 복원/재차감 경로)으로,
#   PHPUnit Unit 테스트가 모든 axis 조합을 커버하며 green 이다. 관리자 환경설정 재고
#   토글 UI 는 코드 변경이 없어 E2E 면제(frontend-change-requires-e2e 비대상).
#   effects ↔ 테스트 매핑은 본 매니페스트 effects 블록과 각 테스트가 1:1 대응한다.
feature: 취소 시 재고 이중복구 제거 + ON/OFF 설정 적용 + 재활성 재차감 (A4/P0-C)

description: |
  주문 취소 시 재고 복원 경로를 Service 단일 경로로 일원화하고(StockRestoreListener 삭제),
  복구 ON/OFF 설정을 정상 적용하며, 취소된 주문을 다시 판매 상태로 되돌릴 때
  복원되었던 재고를 재차감한다.

  핵심 동작:
    - 이중복구 제거: after_cancel 훅의 StockRestoreListener 를 삭제하여
      OrderCancellationService::restoreStock() 만 유일 복원 주체로 만든다.
      전체취소 시 +quantity 1회, 부분취소 시 +cancel_quantity 1회만 복원.
    - 플래그 정리: 복원 후 CANCELLED 상태 OrderOption 의 is_stock_deducted 를 false 로
      정리(StockService::restoreOptionStockForOrderOption). 잔여 미취소 행은 그대로 둔다.
    - 설정 적용: stock_restore_on_cancel=false 면 복원 0건(Service 경로가 설정 체크).
    - 재차감: 취소(cancelled) → 판매상태(salesEligibleValues) 전이 시
      복원된 재고(is_stock_deducted=false CANCELLED 옵션)를 재차감
      (StockService::redeductForReactivation → deductStock 멱등 가드 재사용).
    - 재고 부족 시 InsufficientStockException → 상태 변경 트랜잭션 롤백(상태·재고 모두 불변).

axes:
  restore_setting:
    - on              # stock_restore_on_cancel=true → cancel_quantity 만큼 1회 복원
    - off             # stock_restore_on_cancel=false → 복원 0건
  cancel_type:
    - full            # 전체취소 → +quantity 1회
    - partial         # 부분취소(일부 수량) → +cancel_quantity 1회, 잔여 플래그 유지
    - multi_item      # 다중항목 일부취소 → 항목별 cancel_quantity 합산
  payment_type:
    - unpaid          # 무통장 미입금 (복원은 결제 여부 무관)
    - card_paid       # 카드 결제완료
  reactivation:
    - none            # 되돌리기 없음
    - revert_sufficient   # 취소 → 결제완료 되돌림 (재고 충분) → 재차감
    - revert_insufficient # 취소 → 결제완료 되돌림 (재고 부족) → 롤백

effects:
  # 이중복구 제거 / 단일 경로 (PHPUnit Unit 커버)
  - full_cancel_on_restores_quantity_once        # 전체취소 ON → 정확히 +quantity 1회
  - cancel_off_restores_nothing                  # OFF → 재고 불변
  - partial_cancel_restores_cancel_quantity_once # 부분취소 → +cancel_quantity 만, 잔여 플래그 유지
  - cancel_resets_flag_on_cancelled_option       # CANCELLED 옵션 is_stock_deducted=false
  - cancel_keeps_flag_on_remaining_option        # 잔여 미취소 옵션 is_stock_deducted=true 유지
  # StockService 신규 메서드 (PHPUnit Unit 커버)
  - restore_for_order_option_resets_flag         # restoreOptionStockForOrderOption: 복원+플래그
  - rededuct_for_reactivation_rededucts_restored # redeductForReactivation: 복원분 재차감
  - rededuct_skips_non_restored_via_idempotency  # is_stock_deducted=true 옵션 멱등 스킵
  - rededuct_throws_on_insufficient_stock        # 재고 부족 시 InsufficientStockException
  # 재차감 트리거 (PHPUnit Unit 커버)
  - update_rededucts_on_revert_single            # 단건 update() 되돌림 재차감
  - bulk_update_rededucts_on_revert              # 일괄 bulkUpdate() 되돌림 재차감
  - revert_insufficient_rolls_back_status        # 재고 부족 시 상태·재고 모두 불변(롤백)
  - revert_to_non_sales_status_no_rededuct       # 판매 비대상 전이는 재차감 안 함

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/StockServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/OrderCancellationServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/OrderServiceTest.php
