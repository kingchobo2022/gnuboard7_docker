# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 부재로 nested axes 를 읽지 못하는
#   한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도 audit:allow). 본 변경(A24)은
#   entry × count × path × locale cross product 를 FileUploader Vitest + ProductImageService/
#   StoreProductRequest PHPUnit 가 커버하며 green.
feature: 상품 이미지 개수 상한 안내 + 대표 이미지 문구 정정 (MP12 / A24)

description: |
  ① 개수 상한 초과 silent 무시를 안내로 전환하고 백엔드 안전망을 추가한다.
     - 프론트 FileUploader: maxFiles 초과분을 onUploadError 로 안내(절단 silent 방지)
     - 백엔드 ProductImageService.upload: 컬렉션당 상한(20) 도달 시 도메인 예외 → 422
     - StoreProductRequest images max:10 → max:20 (프론트 maxFiles SSoT 일치)
  ② 대표 이미지 정책은 ★버튼 전용 유지(동작 무변경), 모순된 안내 문구만 정정.

axes:
  entry:
    - fileuploader_front      # FileUploader 프론트 절단
    - single_upload_api       # 개별 업로드 API
    - full_form_submit        # 폼 전체 제출 검증
  count:
    - "19"
    - "20"
    - "21"
  path:
    - new_temp_key            # 신규(tempKey)
    - edit_product_id         # 수정(productId)
  locale:
    - ko
    - en

effects:
  - front_overflow_fires_upload_error    # 초과분 onUploadError 1회
  - front_adds_up_to_limit_only          # 상한까지만 추가
  - backend_upload_throws_at_limit       # 20장 도달 시 도메인 예외
  - controller_returns_422_on_limit      # 422 + 전용 메시지
  - store_request_allows_20              # 20개 통과
  - store_request_rejects_21             # 21개 거부
  - thumbnail_hint_matches_behavior      # 대표 문구 ↔ ★버튼 동작 정합
  - reorder_keeps_thumbnail_unchanged    # 드래그=순서변경(대표 불변)

test_files:
  - templates/_bundled/sirsoft-admin_basic/src/components/composite/__tests__/FileUploader.test.tsx
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/ProductImageServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Requests/StoreProductRequestTest.php
