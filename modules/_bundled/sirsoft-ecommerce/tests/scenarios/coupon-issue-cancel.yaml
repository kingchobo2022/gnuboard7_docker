# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 부재로 nested axes 를 읽지 못하는
#   한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도 audit:allow). 본 변경은
#   CouponService::cancelIssue() 의 미사용-건만-취소 규칙 + cancelled 전환 + issued_count 복원
#   + 활동로그 + 쿠폰ID 정합성 + 권한을 PHPUnit Feature 가 issue_status × ownership cross product
#   로 커버하며 green (CouponIssueCancelTest 6건, CouponIssuesListTest 노출 필드 2건).
feature: 쿠폰 발급취소 (관리자가 미사용 발급 건을 취소)

description: |
  관리자가 쿠폰 발급내역 모달에서 미사용(available) 발급 건을 취소한다. cancelled 로 전환하고
  쿠폰의 issued_count 를 1 복원한다. 사용완료(used)/만료(expired)/이미취소(cancelled) 건은
  취소 불가(400). 다른 쿠폰의 발급 ID 를 해당 쿠폰 URL 로 취소 시도 시 정합성 위반(400).
  취소 성공 1건마다 issue_cancel 활동로그(loggable=CouponIssue). update 권한 필요(403 가드).
  발급내역 조회 응답은 사용처(order_number)·사용여부(is_used)·취소가능(is_cancellable) 노출.

axes:
  issue_status:
    - available   # 미사용 → 취소 가능
    - used        # 사용완료 → 취소 불가(400)
    - expired     # 만료 → 취소 불가(400)
    - cancelled   # 이미 취소 → 취소 불가(400)
  ownership:
    - matching_coupon    # 발급 건이 URL 쿠폰 소속 → 정상 처리
    - mismatched_coupon  # 다른 쿠폰 발급 ID → 400
  permission:
    - update_granted     # update 권한 보유 → 처리
    - read_only          # read 만 보유 → 403

effects:
  - available_issue_marked_cancelled       # available → cancelled 전환
  - issued_count_decremented_on_cancel     # 취소 시 issued_count -1 복원
  - non_available_issue_rejected           # used/expired/cancelled → 400
  - mismatched_coupon_id_rejected          # 쿠폰ID 불일치 → 400
  - activity_log_one_per_cancel            # 취소 성공 1건 → issue_cancel 로그 1건
  - cancel_requires_update_permission      # update 권한 없으면 403
  - issues_response_exposes_usage_fields   # 응답에 order_number/is_used/is_cancellable 노출

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Admin/CouponIssueCancelTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Admin/CouponIssuesListTest.php
