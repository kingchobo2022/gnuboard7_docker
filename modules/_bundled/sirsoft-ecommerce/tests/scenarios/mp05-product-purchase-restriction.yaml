# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 이 없어 fallback YAML 파서가
#   nested axes 배열을 읽지 못하는 한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도
#   audit:allow 처리됨). 본 기능은 백엔드 FormRequest cross-field 검증 변경으로,
#   PHPUnit Feature 가 store/update 진입점과 역할 조합을 커버하며 green.
#   프론트 폼 에러 표시는 422 errors.allowed_roles 를 기존 폼 에러 경로가 소비(코드 변경 없음).
feature: 구매대상 제한(restricted) 선택 시 허용 역할 미선택 저장 차단 (A33/MP05)

description: |
  StoreProductRequest::withValidator() cross-field 검증으로 purchase_restriction=restricted
  인데 allowed_roles 가 비어 있으면(빈 배열 또는 미전송) 422 로 차단한다. none 이면 스킵.
  UpdateProductRequest 는 부모 검증을 상속해 수정 폼에도 동일 적용된다.

axes:
  restriction:
    - none            # 제한 없음 → 검증 스킵
    - restricted      # 제한 → 역할 1개 이상 필수
  roles:
    - empty           # 빈 배열/미전송 → 차단(restricted 시)
    - one             # 1개 → 통과
    - multi           # 복수 → 통과
    - nonexistent     # 미존재 ID → 존재 검증(allowed_roles.*)으로 차단
  request:
    - store
    - update

effects:
  - store_blocks_restricted_with_empty_roles    # restricted + [] → 422 allowed_roles
  - store_blocks_restricted_with_missing_roles  # restricted + 미전송 → 422
  - store_allows_restricted_with_valid_role     # restricted + 유효 역할 → 201
  - store_allows_none_with_empty_roles          # none + [] → 201(무관)
  - store_blocks_restricted_with_nonexistent_role # 미존재 ID → 존재 검증(중복 아닌 1개 에러)
  - update_inherits_restricted_role_validation  # 수정 폼 부모 검증 상속 차단

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Admin/ProductStoreValidationTest.php
