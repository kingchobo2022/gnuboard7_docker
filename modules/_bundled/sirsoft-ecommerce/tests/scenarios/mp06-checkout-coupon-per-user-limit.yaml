# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 이 없어 fallback YAML 파서가
#   nested axes 배열을 읽지 못하는 한계로 검출되지 않는다. 본 기능은 백엔드 전용 변경
#   (주문 단계 per_user_limit 2축 차단)으로, PHPUnit Unit 테스트가 과거 사용(축1)·
#   주문 내 중복(축2)·회원/비회원 조합을 커버하며 green 이다.
feature: 쿠폰 1인 사용 횟수 제한 주문 단계 적용 (U13b 문제2/MP06)

description: |
  per_user_limit 을 주문 시점에 used_at IS NOT NULL 기준으로 검증한다.
  축1=과거 사용(동일 coupon_id, 사용자) + 축2=주문 내 동일 쿠폰 다중 라인.
  두 축 사용 건수 합이 limit 초과 시 차단. 비회원은 축1 조회 skip, 축2만 적용.

axes:
  per_user_limit:
    - unlimited        # 0 = 무제한 → 차단 없음
    - limited          # 1 = 1회 제한
  prior_used:
    - none             # 과거 사용 0건
    - one              # 과거 사용 1건(used_at 세팅)
  application:
    - single_line      # 1라인 적용
    - multi_line_duplicate  # 동일 쿠폰 2라인(축2)
  actor:
    - member           # 회원 → 축1+축2
    - guest            # 비회원 → 축2만

effects:
  - per_user_limit_axis1_prior_used_blocked      # 과거 사용 + limit 초과 → 차단
  - per_user_limit_axis2_within_order_blocked    # 주문 내 중복 → 둘째 라인 차단
  - per_user_limit_unlimited_never_blocks        # 0 = 무제한 차단 없음
  - per_user_limit_guest_skips_axis1             # 비회원 축1 조회 skip
  - per_user_limit_snapshot_mode_skipped         # 환불 재계산 스냅샷 모드 검증 skip

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Services/OrderCalculationCouponValidationTest.php
