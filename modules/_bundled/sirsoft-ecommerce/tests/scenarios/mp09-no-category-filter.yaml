# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 부재로 nested axes 를 읽지 못하는
#   한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도 audit:allow). 본 변경은
#   ProductListRequest::prepareForValidation() boolean 정규화 + lang 키 보강으로,
#   PHPUnit Feature 가 no_category/no_brand 의 boolean 표현 cross product 와 422/필터적용을
#   커버하며 green.
feature: 관리자 상품 목록 "카테고리 미등록" 필터 422 + 키 원문 노출 수정 (A19②)

description: |
  no_category/no_brand 가 문자열('true','1' 등)로 들어와도 prepareForValidation 에서
  실제 boolean 으로 정규화하여 boolean rule 통과 + validated() 가 진짜 boolean 반환 →
  Repository === true 비교 통과. boolean 해석 불가 값은 정규화하지 않아 422 + 번역 메시지.
  messages() 가 참조하던 list.* 누락 키를 ko/en validation.php 에 보강.

axes:
  no_category:
    - bool_true        # true
    - string_true      # "true"
    - one              # 1
    - string_one       # "1"
    - false            # false
    - banana           # boolean 불가 → 422
    - missing          # 누락
  no_brand:
    - bool_true
    - string_true
    - false
    - missing

effects:
  - string_true_passes_validation       # "true" → 200 (수정 전 422)
  - filter_applies_when_uncategorized   # whereDoesntHave('categories') 실적용
  - no_brand_filter_applies             # whereNull('brand_id') 실적용
  - invalid_value_returns_translated_422 # banana → 422 + 번역 메시지(키 원문 아님)
  - missing_param_returns_200

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Admin/ProductControllerListFilterTest.php
