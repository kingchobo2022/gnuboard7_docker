# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 부재로 nested axes 를 읽지 못하는
#   한계로 검출되지 않는다(동일 한계로 다른 번들 시나리오도 audit:allow). 본 변경은
#   CartRepository::pruneExpiredItems + PruneExpiredCartsCommand 의 updated_at 경계·보관기간
#   비활성·dry-run·limit 청크 cross product 를 PHPUnit Unit/Feature 가 커버하며 green.
feature: 장바구니 보관기간 만료 항목 자동 정리 (A2)

description: |
  관리자가 설정한 cart_expiry_days 가 지난 장바구니 항목(마지막 활동 updated_at 기준)을
  일배치 커맨드(sirsoft-ecommerce:prune-expired-carts)로 자동 삭제한다. cart_expiry_days < 1
  (0/미설정)이면 no-op(전체삭제 사고 차단). --dry-run 은 대상 건수만 집계하고 실삭제 0.

axes:
  cart_expiry_days:
    - thirty          # 30 (기본 저장값)
    - one             # 1 (최소)
    - threesixtyfive  # 365 (최대)
    - zero            # 0 → 만료 비활성 no-op
    - unset           # 미설정 → 기본 30 폴백
  updated_at:
    - before_boundary # N-1 일 경과 → 보존
    - at_boundary     # 정각(N 일) → 보존(미만 비교)
    - over_boundary   # N+1 일 경과 → 삭제
  owner:
    - member          # user_id 보유
    - guest           # cart_key (user_id null)
  limit:
    - unlimited       # null
    - chunked         # 청크 단위 삭제
  dry_run:
    - "on"
    - "off"

effects:
  - over_boundary_items_deleted          # 기준 초과 항목만 삭제
  - boundary_and_before_items_preserved  # 정각·직전 항목 보존
  - zero_or_unset_days_is_noop           # days<1 → 0건(전체삭제 차단)
  - member_and_guest_both_pruned         # 회원·비회원 모두 대상
  - dry_run_reports_count_only           # dry-run 실삭제 0 + 대상 출력
  - schedule_registered_daily            # getSchedules 에 daily 등록

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Repositories/CartRepositoryPruneTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Console/PruneExpiredCartsCommandTest.php
