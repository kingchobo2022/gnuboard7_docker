feature: 게시판 환경설정 본인인증 정책 탭 출처 필터 정리

description: |
  게시판 환경설정 "본인인증 정책" 탭은 데이터소스가 source_identifier=sirsoft-board 로 고정된
  게시판 정책 전용 뷰다. 그런데 작동하지 않는 출처(source_type) 필터 드롭다운(전체/코어/모듈/
  플러그인/운영자)이 남아 있어, "코어"/"플러그인" 등을 선택해도 항상 빈 결과가 나오는 모순이 있었다.
  전 출처 정책 관리는 코어 환경설정(/admin/settings?tab=identity)이 담당한다.

  수정 이력:
    - 이슈 #413 item 11-1: 출처 필터가 항상 source_identifier=sirsoft-board 를 붙여 무력화되던 결함
    - 데이터소스(boardIdentityPolicies) params 에서 source_type 제거 (source_identifier 고정은 유지)
    - filter_card 의 출처(source_type) Select 제거, scope/search 필터는 유지
    - 필터 리셋 버튼 if 조건에서 query.source_type 잔여 참조 제거
    - 게시판이 자체 purpose 를 0건 선언하여 항상 비어있던 purpose 배지 카드(identity_purposes_card) 제거

axes:
  element: [source_type_filter, scope_filter, search_filter, purpose_badge_card]

effects:
  - source_type_filter_removed_from_dom
  - scope_filter_remains_functional
  - search_filter_remains_functional
  - empty_purpose_badge_card_removed
  - policy_list_renders_board_module_policies

test_files:
  - modules/_bundled/sirsoft-board/resources/js/__tests__/layouts/identityPolicySourceIdentifier.test.ts
  - modules/_bundled/sirsoft-board/tests/Playwright/specs/admin/board-identity-policy-source-filter.spec.ts

validation:
  audit_rule: frontend-change-requires-e2e