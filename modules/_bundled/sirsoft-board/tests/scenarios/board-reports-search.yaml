feature: 게시판 신고 관리 목록 검색 기능 동작

description: |
  관리자 신고현황(admin_board_reports_index) 화면의 검색 필드(전체/게시글제목/게시판명/
  작성자명/신고자명)로 검색어를 입력하고 검색하면 결과가 필터링된다.

  수정 이력:
    - 이슈 #413 item 72: 검색 기능 미작동 버그 수정
    - 원인: 검색 Select/Input change setState 가 target:"global" 로 _global 에 저장하는데,
      검색 실행 액션(named_actions.searchBoardReports)과 input/select value 바인딩은 _local 을
      읽어 검색어가 URL query(filters[0][field]/value)에 전달되지 않음 → 백엔드 검색 조건 미적용.
    - 수정: 검색 Select/Input(데스크톱+모바일 4곳) change setState 의 target:"global" 제거 → _local 저장.
      reset 버튼은 검색어(searchField/searchQuery)만 _local 초기화로 분리, 나머지 필터는 _global 유지.
    - 백엔드(컨트롤러/Request/Repository)의 검색 로직은 정상 — 변경 없음.

axes:
  field: [all, post_title, board_name, author_name, reporter_name]

effects:
  - search_keyword_propagated_to_url_query
  - search_field_propagated_to_url_query
  - search_input_value_retained_after_navigation
  - reset_clears_search_keyword
  - mobile_search_propagates_to_url_query

test_files:
  - modules/_bundled/sirsoft-board/resources/js/__tests__/layouts/namedActionsBoardReports.test.tsx
  - modules/_bundled/sirsoft-board/tests/Playwright/specs/admin/board-reports-search.spec.ts

validation:
  audit_rule: frontend-change-requires-e2e